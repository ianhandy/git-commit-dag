<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git DAG Visualizer — Paste Log, Get Branch Graph</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #241200;
    --bg-dark: #1A0D00;
    --gold: #DDC165;
    --gold-light: #FFE9A3;
    --orange: #E5591C;
    --text: #C4A66A;
    --text-dim: #8B6F3F;
    --panel-bg: rgba(26, 13, 0, 0.95);
    --border: rgba(221, 193, 101, 0.15);
    --glow-gold: 0 0 20px rgba(221, 193, 101, 0.3);
    --glow-orange: 0 0 20px rgba(229, 89, 28, 0.3);
  }

  body {
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    background: var(--bg-dark);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 12px 24px;
    background: var(--panel-bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    z-index: 10;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  header h1 span {
    color: var(--orange);
  }

  .header-actions {
    display: flex;
    gap: 8px;
    margin-left: auto;
    align-items: center;
  }

  button {
    background: rgba(221, 193, 101, 0.1);
    border: 1px solid var(--border);
    color: var(--gold);
    padding: 6px 14px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  button:hover {
    background: rgba(221, 193, 101, 0.2);
    border-color: var(--gold);
    box-shadow: var(--glow-gold);
  }

  button.primary {
    background: rgba(229, 89, 28, 0.2);
    border-color: var(--orange);
    color: var(--orange);
  }

  button.primary:hover {
    background: rgba(229, 89, 28, 0.3);
    box-shadow: var(--glow-orange);
  }

  .main-area {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* Input Panel */
  .input-panel {
    width: 400px;
    min-width: 300px;
    background: var(--panel-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: width 0.3s;
    z-index: 5;
  }

  .input-panel.collapsed {
    width: 0;
    min-width: 0;
    overflow: hidden;
    border-right: none;
  }

  .input-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .input-header h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
  }

  .input-help {
    font-size: 11px;
    color: var(--text-dim);
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    line-height: 1.5;
  }

  .input-help code {
    background: rgba(221, 193, 101, 0.1);
    padding: 2px 6px;
    border-radius: 3px;
    color: var(--gold);
    font-size: 10px;
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--gold-light);
    font-family: inherit;
    font-size: 12px;
    line-height: 1.6;
    padding: 16px;
    resize: none;
    outline: none;
  }

  textarea::placeholder {
    color: var(--text-dim);
  }

  .input-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .input-footer .stats {
    font-size: 11px;
    color: var(--text-dim);
    margin-right: auto;
  }

  /* Canvas Area */
  .canvas-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
  }

  canvas:active {
    cursor: grabbing;
  }

  /* Tooltip */
  .tooltip {
    position: absolute;
    pointer-events: none;
    background: var(--panel-bg);
    border: 1px solid var(--gold);
    border-radius: 8px;
    padding: 12px 16px;
    max-width: 400px;
    box-shadow: var(--glow-gold);
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 20;
    font-size: 12px;
  }

  .tooltip.visible {
    opacity: 1;
  }

  .tooltip .hash {
    color: var(--orange);
    font-weight: 600;
  }

  .tooltip .message {
    color: var(--gold-light);
    margin-top: 4px;
    line-height: 1.4;
  }

  .tooltip .branches {
    margin-top: 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .tooltip .branch-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(229, 89, 28, 0.2);
    color: var(--orange);
    border: 1px solid rgba(229, 89, 28, 0.4);
  }

  .tooltip .branch-tag.head {
    background: rgba(221, 193, 101, 0.2);
    color: var(--gold);
    border-color: rgba(221, 193, 101, 0.4);
  }

  /* Welcome overlay */
  .welcome {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    color: var(--text-dim);
    font-size: 14px;
    pointer-events: none;
  }

  .welcome .icon {
    font-size: 48px;
    opacity: 0.3;
  }

  .welcome p {
    max-width: 300px;
    text-align: center;
    line-height: 1.6;
  }

  /* Branch filter */
  .branch-filter {
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    display: none;
    flex-direction: column;
    gap: 4px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 10;
    min-width: 160px;
  }

  .branch-filter.visible {
    display: flex;
  }

  .branch-filter label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .branch-filter label:hover {
    background: rgba(221, 193, 101, 0.1);
  }

  .branch-filter input[type="checkbox"] {
    accent-color: var(--orange);
  }

  /* Zoom controls */
  .zoom-controls {
    position: absolute;
    bottom: 16px;
    right: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 10;
  }

  .zoom-controls button {
    width: 36px;
    height: 36px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    border-radius: 8px;
  }

  .zoom-info {
    position: absolute;
    bottom: 16px;
    left: 16px;
    font-size: 11px;
    color: var(--text-dim);
    z-index: 10;
  }

  /* Layout selector */
  .layout-selector {
    display: flex;
    gap: 2px;
    background: rgba(26, 13, 0, 0.8);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px;
  }

  .layout-selector button {
    border: none;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 11px;
    background: transparent;
    color: var(--text-dim);
  }

  .layout-selector button.active {
    background: rgba(221, 193, 101, 0.15);
    color: var(--gold);
  }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(221, 193, 101, 0.3); }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

<header>
  <h1>Git <span>DAG</span> Visualizer</h1>
  <div class="layout-selector">
    <button class="active" data-layout="tree" title="Top-down tree layout">Tree</button>
    <button data-layout="horizontal" title="Left-to-right layout">Horizontal</button>
  </div>
  <div class="header-actions">
    <button id="btn-toggle-panel">Hide Panel</button>
    <button id="btn-sample">Load Sample</button>
    <button id="btn-export" class="primary">Export SVG</button>
  </div>
</header>

<div class="main-area">
  <div class="input-panel" id="inputPanel">
    <div class="input-header">
      <h2>Git Log Input</h2>
    </div>
    <div class="input-help">
      Paste output of:<br>
      <code>git log --oneline --graph --all --decorate</code>
    </div>
    <textarea id="logInput" placeholder="* abc1234 (HEAD -> main) Latest commit
*   def5678 Merge branch 'feature'
|\
| * ghi9012 Add feature
|/
* jkl3456 Initial commit" spellcheck="false"></textarea>
    <div class="input-footer">
      <span class="stats" id="stats"></span>
      <button id="btn-clear">Clear</button>
      <button id="btn-parse" class="primary">Visualize</button>
    </div>
  </div>

  <div class="canvas-area" id="canvasArea">
    <canvas id="dagCanvas"></canvas>
    <div class="welcome" id="welcome">
      <div class="icon">&#9670;</div>
      <p>Paste your <code style="color:var(--gold)">git log --graph</code> output and click <strong style="color:var(--orange)">Visualize</strong></p>
    </div>
    <div class="tooltip" id="tooltip"></div>
    <div class="branch-filter" id="branchFilter"></div>
    <div class="zoom-controls">
      <button id="btn-zoom-in" title="Zoom in">+</button>
      <button id="btn-zoom-out" title="Zoom out">-</button>
      <button id="btn-zoom-fit" title="Fit to view">&#9635;</button>
    </div>
    <div class="zoom-info" id="zoomInfo"></div>
  </div>
</div>

<script>
// ============================================================
// Git DAG Visualizer — Core Logic
// ============================================================

const COLORS = {
  bg: '#1A0D00',
  gold: '#DDC165',
  goldLight: '#FFE9A3',
  orange: '#E5591C',
  text: '#C4A66A',
  textDim: '#8B6F3F',
  border: 'rgba(221, 193, 101, 0.15)',
};

// Branch lane colors
const LANE_COLORS = [
  '#DDC165', // gold
  '#E5591C', // orange
  '#7EC8E3', // blue
  '#5EBA7D', // green
  '#C77DFF', // purple
  '#FF6B6B', // red
  '#FFB347', // amber
  '#77DD77', // light green
  '#AEC6CF', // pastel blue
  '#FF85A2', // pink
];

// ============================================================
// Parser — git log --oneline --graph --all --decorate
// ============================================================

function parseGitLog(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (!lines.length) return null;

  const commits = [];
  const commitMap = new Map();
  const branches = new Map(); // branch name -> commit hash
  let headBranch = null;

  // Track graph columns
  // Each line has a graph prefix and then commit info
  // We need to track which column each commit is in and infer parent relationships

  const graphLines = [];

  for (const line of lines) {
    // Separate graph characters from commit content
    // Graph chars: * | / \ _ space
    // A commit line has a * in the graph portion
    const match = line.match(/^([| \\\/_.]*?\*[| \\\/_.]*)\s+(.*)/);
    if (match) {
      const graphPart = match[1];
      const commitPart = match[2].trim();

      // Parse commit info: hash (decorations) message
      const commitMatch = commitPart.match(/^([a-f0-9]{4,40})\s+(?:\(([^)]+)\)\s+)?(.*)/);
      if (commitMatch) {
        const hash = commitMatch[1];
        const decorations = commitMatch[2] || '';
        const message = commitMatch[3] || '';

        // Parse decorations
        const branchNames = [];
        let isHead = false;
        if (decorations) {
          const parts = decorations.split(',').map(s => s.trim());
          for (const part of parts) {
            if (part.startsWith('HEAD -> ')) {
              isHead = true;
              headBranch = part.replace('HEAD -> ', '');
              branchNames.push(headBranch);
            } else if (part === 'HEAD') {
              isHead = true;
            } else if (part.startsWith('tag: ')) {
              branchNames.push(part);
            } else if (part.startsWith('origin/')) {
              branchNames.push(part);
            } else {
              branchNames.push(part);
            }
          }
        }

        // Find the column of the * in the graph
        const col = Math.floor(graphPart.indexOf('*') / 2);

        const commit = {
          hash,
          message,
          branches: branchNames,
          isHead,
          col,
          parents: [],
          children: [],
          index: commits.length,
        };

        for (const b of branchNames) {
          branches.set(b, hash);
        }

        commits.push(commit);
        commitMap.set(hash, commit);
        graphLines.push({ type: 'commit', col, graphPart, commit });
      } else {
        // Might be a simpler format: just hash and message
        const simpleMatch = commitPart.match(/^([a-f0-9]{4,40})\s*(.*)/);
        if (simpleMatch) {
          const hash = simpleMatch[1];
          const message = simpleMatch[2] || '';
          const col = Math.floor(graphPart.indexOf('*') / 2);

          const commit = {
            hash,
            message,
            branches: [],
            isHead: false,
            col,
            parents: [],
            children: [],
            index: commits.length,
          };

          commits.push(commit);
          commitMap.set(hash, commit);
          graphLines.push({ type: 'commit', col, graphPart, commit });
        }
      }
    } else {
      // Non-commit line (just graph connectors)
      graphLines.push({ type: 'connector', graphPart: line });
    }
  }

  // Infer parent relationships from graph structure
  // Simple heuristic: track active columns and link commits
  inferParents(commits, graphLines, lines);

  return { commits, branches, headBranch, commitMap };
}

function inferParents(commits, graphLines, rawLines) {
  // Strategy: analyze the raw graph lines between commits to find connections
  // A commit's parent is the next commit in its column, unless there's a merge

  if (commits.length === 0) return;

  // Track which columns are "active" (have a pipe going through them)
  // When we see a merge (|\), the commit has two parents
  // When we see a fork (/|), a branch starts

  const commitLines = [];
  for (let i = 0; i < graphLines.length; i++) {
    if (graphLines[i].type === 'commit') {
      commitLines.push({ index: i, commit: graphLines[i].commit });
    }
  }

  for (let ci = 0; ci < commitLines.length; ci++) {
    const current = commitLines[ci];
    const currentCol = current.commit.col;

    // Look at the graph lines between this commit and the next one(s)
    // to figure out parent relationships
    const nextIdx = ci + 1 < commitLines.length ? commitLines[ci + 1].index : graphLines.length;

    // Check graph between current and next commit
    let mergeDetected = false;
    let mergeFromCol = -1;

    for (let li = current.index; li < nextIdx; li++) {
      const line = rawLines[li] || '';
      // Check for merge patterns: |\ or |\  or similar
      if (line.includes('\\') && li > current.index) {
        mergeDetected = true;
        // Find where the \ leads
        const bsIdx = line.indexOf('\\');
        mergeFromCol = Math.floor(bsIdx / 2);
      }
    }

    // Primary parent: next commit in same column or the next commit directly below
    let primaryParent = null;
    for (let pi = ci + 1; pi < commitLines.length; pi++) {
      if (commitLines[pi].commit.col === currentCol) {
        primaryParent = commitLines[pi].commit;
        break;
      }
    }

    // If no same-column parent found, look for the next commit that this merges into
    if (!primaryParent && ci + 1 < commitLines.length) {
      primaryParent = commitLines[ci + 1].commit;
    }

    if (primaryParent) {
      current.commit.parents.push(primaryParent.hash);
      primaryParent.children.push(current.commit.hash);
    }

    // Merge parent: if merge detected, find the commit in that column
    if (mergeDetected && mergeFromCol >= 0) {
      for (let pi = ci + 1; pi < commitLines.length; pi++) {
        if (commitLines[pi].commit.col === mergeFromCol &&
            commitLines[pi].commit !== primaryParent) {
          current.commit.parents.push(commitLines[pi].commit.hash);
          commitLines[pi].commit.children.push(current.commit.hash);
          break;
        }
      }
    }

    // Also check for fork patterns: / means a branch rejoins
    for (let li = current.index; li < nextIdx; li++) {
      const line = rawLines[li] || '';
      if (line.includes('/') && li > current.index) {
        const slIdx = line.indexOf('/');
        const forkCol = Math.floor(slIdx / 2);
        // If the fork column differs from current and merge, find that parent too
        if (forkCol !== currentCol && forkCol !== mergeFromCol) {
          for (let pi = ci + 1; pi < commitLines.length; pi++) {
            if (commitLines[pi].commit.col === forkCol &&
                !current.commit.parents.includes(commitLines[pi].commit.hash)) {
              // This might be a parent from a branch merging
              // Only add if we haven't found 2 parents yet (most merges are binary)
              if (current.commit.parents.length < 2) {
                current.commit.parents.push(commitLines[pi].commit.hash);
                commitLines[pi].commit.children.push(current.commit.hash);
              }
              break;
            }
          }
        }
      }
    }
  }

  // Fallback: if a commit has no parents and isn't the last, connect to next
  for (let i = 0; i < commits.length - 1; i++) {
    if (commits[i].parents.length === 0) {
      commits[i].parents.push(commits[i + 1].hash);
      commits[i + 1].children.push(commits[i].hash);
    }
  }
}

// ============================================================
// Layout Engine
// ============================================================

function layoutTree(data, direction = 'vertical') {
  const { commits, commitMap } = data;
  if (!commits.length) return { nodes: [], edges: [], width: 0, height: 0 };

  const NODE_RADIUS = 8;
  const H_SPACING = direction === 'vertical' ? 80 : 100;
  const V_SPACING = direction === 'vertical' ? 60 : 80;

  // Assign lanes (x-positions) based on branch topology
  // Use the original column from the git log as a starting point
  const maxCol = Math.max(...commits.map(c => c.col));

  const nodes = commits.map((commit, i) => {
    let x, y;
    if (direction === 'vertical') {
      x = commit.col * H_SPACING + 100;
      y = i * V_SPACING + 60;
    } else {
      x = i * H_SPACING + 60;
      y = commit.col * V_SPACING + 100;
    }

    return {
      ...commit,
      x,
      y,
      radius: NODE_RADIUS,
      laneColor: LANE_COLORS[commit.col % LANE_COLORS.length],
    };
  });

  const nodeMap = new Map();
  nodes.forEach(n => nodeMap.set(n.hash, n));

  const edges = [];
  for (const node of nodes) {
    for (const parentHash of node.parents) {
      const parent = nodeMap.get(parentHash);
      if (parent) {
        const isMerge = node.parents.length > 1 && parentHash !== node.parents[0];
        edges.push({
          from: node,
          to: parent,
          isMerge,
          color: isMerge ? parent.laneColor : node.laneColor,
        });
      }
    }
  }

  const padding = 100;
  const width = Math.max(...nodes.map(n => n.x)) + padding * 2;
  const height = Math.max(...nodes.map(n => n.y)) + padding * 2;

  return { nodes, edges, width, height, nodeMap };
}

// ============================================================
// Renderer — Canvas 2D
// ============================================================

class DAGRenderer {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.dpr = window.devicePixelRatio || 1;

    // View transform
    this.panX = 0;
    this.panY = 0;
    this.zoom = 1;

    // Data
    this.layout = null;
    this.data = null;
    this.hoveredNode = null;
    this.selectedNode = null;
    this.direction = 'vertical';

    // Animation
    this.animProgress = 0;
    this.animating = false;
    this.animStartTime = 0;
    this.animDuration = 1200;

    // Filtering
    this.visibleBranches = new Set();
    this.showAllBranches = true;

    this.resize();
    this.setupEvents();
    this.render();
  }

  resize() {
    const rect = this.canvas.parentElement.getBoundingClientRect();
    this.canvas.width = rect.width * this.dpr;
    this.canvas.height = rect.height * this.dpr;
    this.canvas.style.width = rect.width + 'px';
    this.canvas.style.height = rect.height + 'px';
    this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
    this.render();
  }

  setupEvents() {
    let isDragging = false;
    let lastX, lastY;

    this.canvas.addEventListener('mousedown', e => {
      isDragging = true;
      lastX = e.clientX;
      lastY = e.clientY;
    });

    window.addEventListener('mousemove', e => {
      if (isDragging) {
        this.panX += e.clientX - lastX;
        this.panY += e.clientY - lastY;
        lastX = e.clientX;
        lastY = e.clientY;
        this.render();
      } else if (this.layout) {
        this.handleHover(e);
      }
    });

    window.addEventListener('mouseup', () => {
      isDragging = false;
    });

    this.canvas.addEventListener('click', e => {
      if (this.hoveredNode) {
        this.selectedNode = this.selectedNode === this.hoveredNode ? null : this.hoveredNode;
        this.render();
      }
    });

    this.canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const rect = this.canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      const oldZoom = this.zoom;
      const delta = -e.deltaY * 0.001;
      this.zoom = Math.max(0.1, Math.min(5, this.zoom * (1 + delta)));

      // Zoom toward cursor
      this.panX = mx - (mx - this.panX) * (this.zoom / oldZoom);
      this.panY = my - (my - this.panY) * (this.zoom / oldZoom);

      this.updateZoomInfo();
      this.render();
    }, { passive: false });

    // Touch support
    let lastTouchDist = 0;
    let lastTouchX = 0, lastTouchY = 0;

    this.canvas.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        isDragging = true;
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      } else if (e.touches.length === 2) {
        isDragging = false;
        const dx = e.touches[1].clientX - e.touches[0].clientX;
        const dy = e.touches[1].clientY - e.touches[0].clientY;
        lastTouchDist = Math.sqrt(dx * dx + dy * dy);
      }
      e.preventDefault();
    }, { passive: false });

    this.canvas.addEventListener('touchmove', e => {
      if (e.touches.length === 1 && isDragging) {
        this.panX += e.touches[0].clientX - lastTouchX;
        this.panY += e.touches[0].clientY - lastTouchY;
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
        this.render();
      } else if (e.touches.length === 2) {
        const dx = e.touches[1].clientX - e.touches[0].clientX;
        const dy = e.touches[1].clientY - e.touches[0].clientY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const scale = dist / lastTouchDist;
        this.zoom = Math.max(0.1, Math.min(5, this.zoom * scale));
        lastTouchDist = dist;
        this.updateZoomInfo();
        this.render();
      }
      e.preventDefault();
    }, { passive: false });

    this.canvas.addEventListener('touchend', () => {
      isDragging = false;
    });

    window.addEventListener('resize', () => this.resize());
  }

  handleHover(e) {
    const rect = this.canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left - this.panX) / this.zoom;
    const my = (e.clientY - rect.top - this.panY) / this.zoom;

    let found = null;
    const hitRadius = 16;

    for (const node of this.layout.nodes) {
      const dx = mx - node.x;
      const dy = my - node.y;
      if (dx * dx + dy * dy < hitRadius * hitRadius) {
        found = node;
        break;
      }
    }

    if (found !== this.hoveredNode) {
      this.hoveredNode = found;
      this.canvas.style.cursor = found ? 'pointer' : 'grab';
      this.render();
      this.updateTooltip(e, found);
    } else if (found) {
      this.updateTooltip(e, found);
    }
  }

  updateTooltip(e, node) {
    const tooltip = document.getElementById('tooltip');
    if (!node) {
      tooltip.classList.remove('visible');
      return;
    }

    let html = `<div class="hash">${node.hash}</div>`;
    html += `<div class="message">${escapeHtml(node.message)}</div>`;

    if (node.branches.length) {
      html += '<div class="branches">';
      for (const b of node.branches) {
        const cls = b === this.data?.headBranch ? 'branch-tag head' : 'branch-tag';
        html += `<span class="${cls}">${escapeHtml(b)}</span>`;
      }
      html += '</div>';
    }

    const parentCount = node.parents.length;
    const childCount = node.children.length;
    if (parentCount > 1) {
      html += `<div style="margin-top:6px;color:${COLORS.textDim};font-size:10px">Merge commit (${parentCount} parents)</div>`;
    }

    tooltip.innerHTML = html;
    tooltip.classList.add('visible');

    const rect = this.canvas.parentElement.getBoundingClientRect();
    const tx = Math.min(e.clientX - rect.left + 16, rect.width - 420);
    const ty = Math.min(e.clientY - rect.top + 16, rect.height - 100);
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
  }

  updateZoomInfo() {
    document.getElementById('zoomInfo').textContent = `${Math.round(this.zoom * 100)}%`;
  }

  setData(data) {
    this.data = data;
    this.layout = layoutTree(data, this.direction);
    this.hoveredNode = null;
    this.selectedNode = null;

    // Collect all branches for filter
    this.visibleBranches.clear();
    data.branches.forEach((hash, name) => {
      this.visibleBranches.add(name);
    });
    this.showAllBranches = true;

    this.buildBranchFilter();
    this.fitToView();
    this.startAnimation();
  }

  setDirection(dir) {
    this.direction = dir;
    if (this.data) {
      this.layout = layoutTree(this.data, dir);
      this.fitToView();
      this.startAnimation();
    }
  }

  fitToView() {
    if (!this.layout || !this.layout.nodes.length) return;

    const rect = this.canvas.parentElement.getBoundingClientRect();
    const cw = rect.width;
    const ch = rect.height;

    const minX = Math.min(...this.layout.nodes.map(n => n.x)) - 40;
    const maxX = Math.max(...this.layout.nodes.map(n => n.x)) + 40;
    const minY = Math.min(...this.layout.nodes.map(n => n.y)) - 40;
    const maxY = Math.max(...this.layout.nodes.map(n => n.y)) + 40;

    const graphW = maxX - minX;
    const graphH = maxY - minY;

    this.zoom = Math.min(cw / graphW, ch / graphH, 2);
    this.panX = (cw - graphW * this.zoom) / 2 - minX * this.zoom;
    this.panY = (ch - graphH * this.zoom) / 2 - minY * this.zoom;

    this.updateZoomInfo();
  }

  startAnimation() {
    this.animProgress = 0;
    this.animating = true;
    this.animStartTime = performance.now();
    this.animateFrame();
  }

  animateFrame() {
    if (!this.animating) return;

    const elapsed = performance.now() - this.animStartTime;
    this.animProgress = Math.min(1, elapsed / this.animDuration);

    // Ease out cubic
    this.animProgress = 1 - Math.pow(1 - this.animProgress, 3);

    this.render();

    if (this.animProgress < 1) {
      requestAnimationFrame(() => this.animateFrame());
    } else {
      this.animating = false;
    }
  }

  buildBranchFilter() {
    const filter = document.getElementById('branchFilter');
    if (!this.data || this.data.branches.size === 0) {
      filter.classList.remove('visible');
      return;
    }

    filter.innerHTML = '';
    const sortedBranches = [...this.data.branches.keys()].sort();
    for (const name of sortedBranches) {
      const label = document.createElement('label');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = true;
      cb.addEventListener('change', () => {
        if (cb.checked) {
          this.visibleBranches.add(name);
        } else {
          this.visibleBranches.delete(name);
        }
        this.render();
      });
      label.appendChild(cb);
      const span = document.createElement('span');
      span.style.color = name === this.data.headBranch ? COLORS.gold : COLORS.text;
      span.textContent = name;
      label.appendChild(span);
      filter.appendChild(label);
    }

    if (sortedBranches.length > 1) {
      filter.classList.add('visible');
    }
  }

  render() {
    const ctx = this.ctx;
    const w = this.canvas.width / this.dpr;
    const h = this.canvas.height / this.dpr;

    // Clear
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, w, h);

    // Draw subtle grid
    this.drawGrid(ctx, w, h);

    if (!this.layout || !this.layout.nodes.length) return;

    ctx.save();
    ctx.translate(this.panX, this.panY);
    ctx.scale(this.zoom, this.zoom);

    const visibleCount = Math.floor(this.layout.nodes.length * this.animProgress);

    // Draw edges
    for (const edge of this.layout.edges) {
      if (edge.from.index >= visibleCount) continue;
      if (edge.to.index >= visibleCount) continue;
      this.drawEdge(ctx, edge);
    }

    // Draw nodes
    for (let i = 0; i < visibleCount; i++) {
      const node = this.layout.nodes[i];
      this.drawNode(ctx, node, i);
    }

    ctx.restore();
  }

  drawGrid(ctx, w, h) {
    const gridSize = 40 * this.zoom;
    const offsetX = this.panX % gridSize;
    const offsetY = this.panY % gridSize;

    ctx.strokeStyle = 'rgba(221, 193, 101, 0.03)';
    ctx.lineWidth = 1;

    for (let x = offsetX; x < w; x += gridSize) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, h);
      ctx.stroke();
    }

    for (let y = offsetY; y < h; y += gridSize) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(w, y);
      ctx.stroke();
    }
  }

  drawEdge(ctx, edge) {
    const { from, to, isMerge, color } = edge;

    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = isMerge ? 1.5 : 2;
    ctx.globalAlpha = isMerge ? 0.5 : 0.7;

    if (isMerge) {
      ctx.setLineDash([4, 4]);
    }

    // Curved edge
    if (from.x === to.x) {
      // Straight vertical/horizontal
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);
    } else {
      // Bezier curve
      const midY = (from.y + to.y) / 2;
      const midX = (from.x + to.x) / 2;

      if (this.direction === 'vertical') {
        ctx.moveTo(from.x, from.y);
        ctx.bezierCurveTo(from.x, midY, to.x, midY, to.x, to.y);
      } else {
        ctx.moveTo(from.x, from.y);
        ctx.bezierCurveTo(midX, from.y, midX, to.y, to.x, to.y);
      }
    }

    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
  }

  drawNode(ctx, node, index) {
    const { x, y, radius, laneColor, hash, branches, isHead, parents } = node;
    const isMerge = parents.length > 1;
    const isHovered = this.hoveredNode === node;
    const isSelected = this.selectedNode === node;
    const isTip = branches.length > 0;

    // Glow effect for hovered/selected
    if (isHovered || isSelected || isTip) {
      const glowRadius = isSelected ? 24 : isHovered ? 20 : 16;
      const gradient = ctx.createRadialGradient(x, y, 0, x, y, glowRadius);
      const glowColor = isHead ? COLORS.gold : isTip ? COLORS.orange : laneColor;
      gradient.addColorStop(0, glowColor + '60');
      gradient.addColorStop(1, glowColor + '00');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(x, y, glowRadius, 0, Math.PI * 2);
      ctx.fill();
    }

    // Node body
    ctx.beginPath();
    const r = isHovered ? radius * 1.3 : isSelected ? radius * 1.4 : isTip ? radius * 1.1 : radius;

    if (isMerge) {
      // Diamond shape for merge commits
      ctx.moveTo(x, y - r);
      ctx.lineTo(x + r, y);
      ctx.lineTo(x, y + r);
      ctx.lineTo(x - r, y);
      ctx.closePath();
    } else {
      ctx.arc(x, y, r, 0, Math.PI * 2);
    }

    // Fill
    ctx.fillStyle = isHead ? COLORS.gold : isTip ? COLORS.orange : laneColor;
    ctx.fill();

    // Stroke
    ctx.strokeStyle = isHovered || isSelected ? COLORS.goldLight : 'rgba(0,0,0,0.3)';
    ctx.lineWidth = isHovered || isSelected ? 2 : 1;
    ctx.stroke();

    // Hash label
    ctx.fillStyle = COLORS.textDim;
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';

    if (this.direction === 'vertical') {
      ctx.fillText(hash.substring(0, 7), x + radius + 8, y);
    } else {
      ctx.textAlign = 'center';
      ctx.fillText(hash.substring(0, 7), x, y + radius + 14);
    }

    // Branch labels
    if (branches.length > 0) {
      ctx.font = '10px monospace';
      let labelY = this.direction === 'vertical' ? y - radius - 8 : y - radius - 20;

      for (const branch of branches) {
        const isHeadBranch = branch === this.data?.headBranch;
        const text = branch;
        const tw = ctx.measureText(text).width;

        const lx = this.direction === 'vertical' ? x + radius + 8 : x - tw / 2 - 6;
        const ly = this.direction === 'vertical' ? labelY : labelY;

        // Background pill
        ctx.fillStyle = isHeadBranch ? 'rgba(221, 193, 101, 0.15)' : 'rgba(229, 89, 28, 0.15)';
        ctx.strokeStyle = isHeadBranch ? 'rgba(221, 193, 101, 0.4)' : 'rgba(229, 89, 28, 0.4)';
        ctx.lineWidth = 1;
        roundRect(ctx, lx - 6, ly - 8, tw + 12, 16, 8);
        ctx.fill();
        ctx.stroke();

        // Text
        ctx.fillStyle = isHeadBranch ? COLORS.gold : COLORS.orange;
        ctx.textAlign = 'left';
        ctx.fillText(text, lx, ly);

        labelY -= 20;
      }
    }
  }

  exportSVG() {
    if (!this.layout || !this.layout.nodes.length) return;

    const padding = 60;
    const minX = Math.min(...this.layout.nodes.map(n => n.x)) - padding;
    const minY = Math.min(...this.layout.nodes.map(n => n.y)) - padding;
    const maxX = Math.max(...this.layout.nodes.map(n => n.x)) + padding + 120;
    const maxY = Math.max(...this.layout.nodes.map(n => n.y)) + padding;
    const w = maxX - minX;
    const h = maxY - minY;

    let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="${minX} ${minY} ${w} ${h}">`;
    svg += `<rect x="${minX}" y="${minY}" width="${w}" height="${h}" fill="${COLORS.bg}"/>`;

    // Edges
    for (const edge of this.layout.edges) {
      const { from, to, isMerge, color } = edge;
      const opacity = isMerge ? 0.5 : 0.7;
      const dash = isMerge ? 'stroke-dasharray="4 4"' : '';
      const strokeW = isMerge ? 1.5 : 2;

      if (from.x === to.x) {
        svg += `<line x1="${from.x}" y1="${from.y}" x2="${to.x}" y2="${to.y}" stroke="${color}" stroke-width="${strokeW}" opacity="${opacity}" ${dash}/>`;
      } else {
        const midY = (from.y + to.y) / 2;
        svg += `<path d="M${from.x},${from.y} C${from.x},${midY} ${to.x},${midY} ${to.x},${to.y}" fill="none" stroke="${color}" stroke-width="${strokeW}" opacity="${opacity}" ${dash}/>`;
      }
    }

    // Nodes
    for (const node of this.layout.nodes) {
      const { x, y, radius, laneColor, hash, branches, isHead, parents } = node;
      const isMerge = parents.length > 1;
      const isTip = branches.length > 0;
      const fill = isHead ? COLORS.gold : isTip ? COLORS.orange : laneColor;

      if (isMerge) {
        svg += `<polygon points="${x},${y-radius} ${x+radius},${y} ${x},${y+radius} ${x-radius},${y}" fill="${fill}" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>`;
      } else {
        svg += `<circle cx="${x}" cy="${y}" r="${radius}" fill="${fill}" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>`;
      }

      // Hash label
      svg += `<text x="${x + radius + 8}" y="${y}" fill="${COLORS.textDim}" font-family="monospace" font-size="10" dominant-baseline="middle">${hash.substring(0, 7)}</text>`;

      // Branch labels
      if (branches.length > 0) {
        let labelY = y - radius - 8;
        for (const branch of branches) {
          const isHeadBranch = branch === this.data?.headBranch;
          const textFill = isHeadBranch ? COLORS.gold : COLORS.orange;
          svg += `<text x="${x + radius + 8}" y="${labelY}" fill="${textFill}" font-family="monospace" font-size="10" dominant-baseline="middle">${escapeHtml(branch)}</text>`;
          labelY -= 20;
        }
      }
    }

    svg += '</svg>';

    const blob = new Blob([svg], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'git-dag.svg';
    a.click();
    URL.revokeObjectURL(url);
  }
}

// Utility
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ============================================================
// App Init
// ============================================================

const canvas = document.getElementById('dagCanvas');
const renderer = new DAGRenderer(canvas);

// Parse button
document.getElementById('btn-parse').addEventListener('click', () => {
  const text = document.getElementById('logInput').value.trim();
  if (!text) return;

  const data = parseGitLog(text);
  if (!data || !data.commits.length) {
    document.getElementById('stats').textContent = 'Could not parse log';
    return;
  }

  document.getElementById('welcome').style.display = 'none';
  document.getElementById('stats').textContent = `${data.commits.length} commits, ${data.branches.size} branches`;
  renderer.setData(data);
});

// Clear
document.getElementById('btn-clear').addEventListener('click', () => {
  document.getElementById('logInput').value = '';
  document.getElementById('stats').textContent = '';
});

// Sample
document.getElementById('btn-sample').addEventListener('click', () => {
  document.getElementById('logInput').value = SAMPLE_LOG;
  document.getElementById('btn-parse').click();
});

// Export
document.getElementById('btn-export').addEventListener('click', () => {
  renderer.exportSVG();
});

// Toggle panel
document.getElementById('btn-toggle-panel').addEventListener('click', () => {
  const panel = document.getElementById('inputPanel');
  const btn = document.getElementById('btn-toggle-panel');
  panel.classList.toggle('collapsed');
  btn.textContent = panel.classList.contains('collapsed') ? 'Show Panel' : 'Hide Panel';
  setTimeout(() => renderer.resize(), 350);
});

// Layout buttons
document.querySelectorAll('.layout-selector button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.layout-selector button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderer.setDirection(btn.dataset.layout === 'horizontal' ? 'horizontal' : 'vertical');
  });
});

// Zoom buttons
document.getElementById('btn-zoom-in').addEventListener('click', () => {
  renderer.zoom = Math.min(5, renderer.zoom * 1.3);
  renderer.updateZoomInfo();
  renderer.render();
});

document.getElementById('btn-zoom-out').addEventListener('click', () => {
  renderer.zoom = Math.max(0.1, renderer.zoom / 1.3);
  renderer.updateZoomInfo();
  renderer.render();
});

document.getElementById('btn-zoom-fit').addEventListener('click', () => {
  renderer.fitToView();
  renderer.render();
});

// Auto-parse on paste
document.getElementById('logInput').addEventListener('paste', () => {
  setTimeout(() => document.getElementById('btn-parse').click(), 50);
});

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
    document.getElementById('btn-parse').click();
  }
});
